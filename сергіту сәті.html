<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сергіту сәті: Домино</title>
    <style>
        /* Жалпы стильдер */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f1e1; /* Жұмсақ ақшыл түс */
            color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Ұлттық стильдегі жоғарғы бөлім */
        header {
            width: 100%;
            background-color: #005aae; /* Қазақстан туының көгілдір түсіне жақын */
            background-image: url('https://www.transparenttextures.com/patterns/ornamental-fans.png'); /* Ою тәрізді патерн */
            color: #ffd700; /* Алтын түс */
            padding: 20px 0;
            text-align: center;
            border-bottom: 5px solid #ffd700;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            margin: 0;
            font-size: 2.5rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }

        /* Ойын алаңы */
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: white;
            border-radius: 15px;
            border: 3px solid #005aae;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            position: relative;
        }

        .description {
            font-size: 1.2rem;
            margin-bottom: 30px;
            font-style: italic;
        }

        /* Домино суреті мен визуализациясы */
        .domino-area {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .domino-card {
            width: 80px;
            height: 160px;
            background-color: #fff;
            border: 4px solid #333;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .domino-card:hover {
            transform: translateY(-10px) rotate(5deg);
        }

        .domino-card::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 4px;
            background-color: #333;
            transform: translateY(-50%);
        }

        .dots {
            height: 50%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 10px;
            box-sizing: border-box;
        }

        .dot {
            width: 12px;
            height: 12px;
            background-color: #333;
            border-radius: 50%;
            margin: auto;
        }

        /* Батырма стилі */
        .btn {
            background-color: #ffd700;
            color: #005aae;
            border: 2px solid #005aae;
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            background-color: #005aae;
            color: white;
        }

        /* Ою-өрнек фоны үшін төменгі жақ */
        footer {
            margin-top: auto;
            width: 100%;
            height: 60px;
            background: #005aae;
            background-image: url('https://www.transparenttextures.com/patterns/ornamental-fans.png');
            border-top: 5px solid #ffd700;
        }

        /* Жасырын нүктелерді басқару */
        .hidden { visibility: hidden; }
        .back-btn { 
            position: fixed; top: 20px; left: 20px; 
            background-color: rgba(203, 169, 116, 0.2); color: #cba974; 
            border: 1px solid #cba974; padding: 10px 15px; 
            border-radius: 8px; cursor: pointer; 
            z-index: 100; font-weight: bold; 
            transition: 0.3s;
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>

<header>
    <h1>Сергіту сәті</h1>
</header>

<div class="container">
    <h2 style="color: #005aae;">Домино ойыны</h2>
    <p class="description">Зейініңізді жинақтап, сәл демалып алыңыз!</p>

    <div class="domino-area" id="dominoBox">
        <div class="domino-card">
            <div class="dots">
                <div class="dot"></div><div class="dot hidden"></div><div class="dot"></div>
                <div class="dot hidden"></div><div class="dot"></div><div class="dot hidden"></div>
                <div class="dot"></div><div class="dot hidden"></div><div class="dot"></div>
            </div>
            <div class="dots">
                <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot"></div>
                <div class="dot hidden"></div><div class="dot"></div><div class="dot hidden"></div>
                <div class="dot"></div><div class="dot hidden"></div><div class="dot hidden"></div>
            </div>
        </div>

        <div class="domino-card">
            <div class="dots">
                <div class="dot"></div><div class="dot hidden"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot hidden"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot hidden"></div><div class="dot"></div>
            </div>
            <div class="dots">
                <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
                <div class="dot hidden"></div><div class="dot"></div><div class="dot hidden"></div>
                <div class="dot hidden"></div><div class="dot hidden"></div><div class="dot hidden"></div>
            </div>
        </div>
    </div>

    <button class="btn" onclick="shuffleDomino()">Тастарды араластыру</button>
</div>

<footer></footer>

<script>
    function shuffleDomino() {
        const box = document.getElementById('dominoBox');
        box.style.opacity = '0';
        
        setTimeout(() => {
            // Жай ғана визуалды эффект үшін орындарды ауыстыру немесе қайта жүктеу
            location.reload();
        }, 300);
    }
</script>

</body>
</html>
