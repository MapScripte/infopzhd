<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифрлы әдіспен топқа бөлу</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Oswald:wght@500&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Montserrat', sans-serif;
            background: #020205;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            padding-bottom: 50px;
            position: relative;
        }

        /* Ою-өрнекті фон (альфа-каналмен) */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            /* Сәндік ою-өрнек фоны */
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgdmlld0JveD0iMCAwIDgwIDgwIj48ZyBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxnIGZpbGw9IiNjYmE5NzQiIGZpbGwtb3BhY2l0eT0iMC4wNyI+PHBhdGggZD0iTTUwIDUwNWgyMHYyMEg1MFY1MHpNMCAwaDIwdjIwSDBWMnpNMjAgMjBoMjB2MjBIMjBWMjB6TTAgNDBoMjB2MjBIMFY0MHoyMCAyMGgyMHYyMEgyMFY2MHoyMCAwaDIwdjIwSDIwVjB6TTQwIDIwaDIwdjIwSDQwVjIwek02MCA0MGgyMHYyMEg2MFY0MHpNMjAgMGgyMHYyMEgyMFYwek00MCA0MGgyMHYyMEg0MFY0MHpNMCA2MGgyMHYyMEgwVjYwek02MCAwaDIwdjIwSDYwVjB6TTQwIDYwaDIwdjIwSDQwVjYwek02MCAyMGgyMHYyMEg2MFYyMHoiLz48L2g+PC9nPjwvc3ZnPg==');
            background-color: #020205;
            opacity: 0.6;
        }

        .background-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -2;
            background: radial-gradient(circle at center, #0a192f 0%, #020205 100%);
        }

        .main-card {
            margin-top: 50px;
            width: 90%; max-width: 850px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 2px solid #cba974; /* Алтын түсті жиек */
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative; z-index: 10;
        }
        
        /* Жоғарғы ою */
        .main-card::before {
            content: "✦✦✦";
            font-size: 1.5rem;
            color: #cba974;
            display: block;
            margin-bottom: 10px;
            letter-spacing: 10px;
        }

        h1 {
            font-family: 'Oswald', sans-serif;
            font-size: 2.2rem; font-weight: 700;
            background: linear-gradient(to right, #fff, #cba974, #fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px; letter-spacing: 2px;
            text-transform: uppercase;
        }

        .text {
            color: #b0b8c0;
            margin: 20px 0;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        textarea {
            width: 100%; height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(203, 169, 116, 0.4);
            border-radius: 20px; color: #fff;
            padding: 20px; font-size: 1.1rem;
            outline: none; transition: 0.4s;
            margin-bottom: 20px; font-family: inherit;
        }
        
        textarea:focus {
            border-color: #cba974;
            box-shadow: 0 0 15px rgba(203, 169, 116, 0.2);
        }

        .button-group {
            display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;
        }

        .btn-glow {
            padding: 15px 40px; font-size: 1.1rem; font-weight: bold;
            color: #000; background: #cba974;
            border: none; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 0 20px rgba(203, 169, 116, 0.4);
            text-transform: uppercase;
            position: relative;
        }
        
        .btn-glow::before {
            content: "❂";
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .btn-glow:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(203, 169, 116, 0.7); }
        
        .btn-clear {
            padding: 15px 30px; font-size: 1rem; font-weight: bold;
            color: #fff; background: rgba(231, 76, 60, 0.1);
            border: 1px solid #e74c3c; border-radius: 50px;
            cursor: pointer; transition: 0.3s;
        }
        
        .btn-clear:hover { background: #e74c3c; box-shadow: 0 0 20px rgba(231, 76, 60, 0.5); }

        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px; margin-top: 50px; width: 90%; max-width: 1000px;
            position: relative; z-index: 10;
        }

        .card {
            background: rgba(255, 255, 255, 0.04); border-radius: 25px;
            padding: 35px; border: 1px solid rgba(255, 255, 255, 0.08);
            display: flex; flex-direction: column; align-items: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        /* Картаның бұрышындағы ою */
        .card::after {
            content: "❃";
            position: absolute;
            bottom: -15px; right: -15px;
            font-size: 5rem;
            color: rgba(203, 169, 116, 0.1);
            transform: rotate(-15deg);
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: rgba(203, 169, 116, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }

        .student-ul { 
            list-style: none; width: 100%; 
            border-top: 2px solid rgba(203, 169, 116, 0.3); 
            padding-top: 20px; 
            margin-top: 10px;
            z-index: 1;
        }
        
        .student-ul li { 
            padding: 12px; font-size: 1.1rem; 
            border-bottom: 1px solid rgba(255,255,255,0.03);
            text-align: center;
            color: #eee;
        }

        /* Топтардың стильдері */
        .it-style { border-top: 6px solid #4facfe; } /* IT - Көк түс */
        .marketing-style { border-top: 6px solid #f093fb; } /* Маркетинг - Күлгін түс */

        /* Артқа қайту батырмасы */
        .back-btn { 
            position: fixed; top: 20px; left: 20px; 
            background-color: rgba(203, 169, 116, 0.2); color: #cba974; 
            border: 1px solid #cba974; padding: 10px 15px; 
            border-radius: 8px; cursor: pointer; 
            z-index: 100; font-weight: bold; 
            transition: 0.3s;
        }
        .back-btn:hover { background-color: #cba974; color: #000; }
    </style>
</head>
<body>
    <button class="back-btn" onclick="history.back()">⬅ Артқа қайту</button>
    
    <div class="background-container"></div>
    
    <div class="main-card">
        <h1>ЦИФРЛЫ ӘДІСПЕН ТОПҚА БӨЛУ</h1>
        <p class="text">
            Заманауи технологиялар мен ұлттық нақыштың үйлесімі. <br>
            "IT СТАРТАП" және "МАРКЕТИНГ" командаларына бөлініп, биікке бірге жетейік!
        </p>
        
        <textarea id="namesList" placeholder="Қатысушылардың есімдерін әр жолға жазыңыз..."></textarea>
        
        <div class="button-group">
            <button class="btn-glow" onclick="splitToGroups()">ТОПҚА БӨЛУ</button>
            <button class="btn-clear" onclick="clearList()">ТАЗАЛАУ</button>
        </div>
    </div>

    <div id="resultsArea" class="results-grid"></div>

    <script>
        const textArea = document.getElementById('namesList');

        // 1. Бет жүктелгенде сақталған тізімді шығару
        window.onload = () => {
            const savedData = localStorage.getItem('it_marketing_split_students');
            if (savedData) {
                textArea.value = savedData;
            } else {
                // Егер жады бос болса, мысал келтіру
                const sample = Array.from({length: 10}, (_, i) => `Қатысушы ${i+1}`).join('\n');
                textArea.value = sample;
            }
        };

        // 2. Жазу барысында әр өзгерісті сақтау
        textArea.addEventListener('input', () => {
            localStorage.setItem('it_marketing_split_students', textArea.value);
        });

        // 3. Тізімді тазалау функциясы
        function clearList() {
            if(confirm("Тізімді толық өшіргіңіз келе ме?")) {
                textArea.value = "";
                localStorage.removeItem('it_marketing_split_students');
                document.getElementById('resultsArea').innerHTML = "";
            }
        }

        // 4. Топқа бөлу функциясы
        function splitToGroups() {
            const students = textArea.value.split('\n').map(s => s.trim()).filter(s => s !== "");
            if (students.length < 2) return alert("Кемінде 2 адам қажет!");

            // Тізімді араластыру
            students.sort(() => Math.random() - 0.5);
            
            // 2 топқа бөлу
            const groups = [[], []];
            students.forEach((name, i) => groups[i % 2].push(name));

            // Топтардың параметрлері
            const config = [
                { name: "IT СТАРТАП", icon: "💻", class: "it-style", color: "#4facfe" },
                { name: "МАРКЕТИНГ", icon: "🚀", class: "marketing-style", color: "#f093fb" }
            ];

            const container = document.getElementById('resultsArea');
            container.innerHTML = "";

            groups.forEach((group, i) => {
                const card = document.createElement('div');
                card.className = `card ${config[i].class}`;
                card.innerHTML = `
                    <div style="font-size:3.5rem; margin-bottom:10px; z-index:1">${config[i].icon}</div>
                    <h2 style="font-family:'Oswald', sans-serif; color:${config[i].color}; margin-bottom:15px; letter-spacing:2px; font-size:2rem; z-index:1">${config[i].name}</h2>
                    <ul class="student-ul">${group.map(s => `<li>${s}</li>`).join('')}</ul>
                    <div style="margin-top:20px; font-weight:bold; color:${config[i].color}; font-size:1.1rem; z-index:1">Саны: ${group.length}</div>
                `;
                container.appendChild(card);
            });

            // Тегіс айналдыру эффектісі
            window.scrollTo({ top: container.offsetTop - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>
